<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D Hypnotic Hyper-Vortex</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    body { 
      background: #000; 
      overflow: hidden; 
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { 
      display: block; 
      width: 100vw; 
      height: 100vh; 
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <canvas id="tunnelCanvas"></canvas>

  <script>
    const canvas = document.getElementById('tunnelCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); 

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    let mouse = { x: width / 2, y: height / 2, targetX: width / 2, targetY: height / 2 };

    const updatePointer = (clientX, clientY) => {
      mouse.targetX = clientX;
      mouse.targetY = clientY;
    };

    window.addEventListener('mousemove', (e) => updatePointer(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) updatePointer(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    // --- State Management ---
    let clickCount = 0;
    let clickTimer = null;
    let isWarpActive = false;
    let isSpacePressed = false;
    let isShiftPressed = false;

    let warpEnergy = 0;   
    let brakeEnergy = 0;  
    let slowMoEnergy = 0; 

    // Triple-click hyper speed action template
    const handleInteraction = () => {
      clickCount++;
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => { clickCount = 0; }, 400);

      if (clickCount === 3) {
        isWarpActive = true;
        clickCount = 0;
        setTimeout(() => { isWarpActive = false; }, 4000);
      }
    };

    window.addEventListener('click', handleInteraction);
    window.addEventListener('touchstart', (e) => {
      if(e.touches.length > 0) updatePointer(e.touches[0].clientX, e.touches[0].clientY);
      handleInteraction();
    }, { passive: true });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault(); 
        isSpacePressed = true;
      }
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
        isShiftPressed = true;
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        isSpacePressed = false;
      }
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
        isShiftPressed = false;
      }
    });

    // --- Tunnel Depth Pipeline Setup ---
    const maxRings = 60; 
    const segments = 8; 
    let rings = [];
    let frame = 0;

    for (let i = 0; i < maxRings; i++) {
      rings.push({ z: (i / maxRings) * 1.5 });
    }

    const spaceStars = Array.from({ length: 120 }, () => ({
      x: (Math.random() - 0.5) * 1500,
      y: (Math.random() - 0.5) * 1500,
      z: Math.random() * 1.5
    }));

    let shiftSparks = [];

    function spawnShiftSparks(horizonX, horizonY) {
      if (Math.random() < 0.7) {
        for (let s = 0; s < 5; s++) {
          let angle = Math.random() * Math.PI * 2;
          let speed = 4 + Math.random() * 9;
          shiftSparks.push({
            x: (Math.random() - 0.5) * 50, 
            y: (Math.random() - 0.5) * 50,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            z: 1.5, 
            size: 2 + Math.random() * 4,
            hue: (frame * 2 + Math.random() * 90) % 360, 
            alpha: 1
          });
        }
      }
    }

    function draw() {
      // Smooth tracking matrix variables
      mouse.x += (mouse.targetX - mouse.x) * 0.08;
      mouse.y += (mouse.targetY - mouse.y) * 0.08;

      warpEnergy += ((isWarpActive ? 1 : 0) - warpEnergy) * 0.05;
      brakeEnergy += ((isSpacePressed ? 1 : 0) - brakeEnergy) * 0.15;
      slowMoEnergy += ((isShiftPressed ? 1 : 0) - slowMoEnergy) * 0.1;

      let baseSpeed = 0.002;
      let targetSpeed = baseSpeed + (warpEnergy * 0.025);
      targetSpeed *= (1 - brakeEnergy * 0.95);   
      targetSpeed *= (1 - slowMoEnergy * 0.85);  

      let speedModifier = targetSpeed;

      // Trailing backdrop alpha modifier calculation
      let trailingBlur = 0.15 - (warpEnergy * 0.07) + (slowMoEnergy * 0.05);
      ctx.fillStyle = `rgba(0, 0, 0, ${Math.max(0.04, Math.min(0.35, trailingBlur))})`;
      ctx.fillRect(0, 0, width, height);

      frame += 1.5 * (1 - slowMoEnergy * 0.7);

      let horizonX = width / 2 + (mouse.x - width / 2) * (0.25 + brakeEnergy * 0.25);
      let horizonY = height / 2 + (mouse.y - height / 2) * (0.25 + brakeEnergy * 0.25);

      if (slowMoEnergy > 0.05) {
        spawnShiftSparks(horizonX, horizonY);
      }

      // --- Rendering Phase 1: Cosmic Background Particles ---
      spaceStars.forEach(star => {
        star.z -= speedModifier * 2.5;
        if (star.z <= 0) {
          star.z = 1.5;
          star.x = (Math.random() - 0.5) * 1500;
          star.y = (Math.random() - 0.5) * 1500;
        }

        let starScale = 1.5 / star.z;
        let sx = width / 2 + (star.x + (mouse.x - width / 2) * -0.5) * starScale;
        let sy = height / 2 + (star.y + (mouse.y - height / 2) * -0.5) * starScale;

        let prevZ = star.z + (speedModifier * 2.5);
        let prevScale = 1.5 / prevZ;
        let px = width / 2 + (star.x + (mouse.x - width / 2) * -0.5) * prevScale;
        let py = height / 2 + (star.y + (mouse.y - height / 2) * -0.5) * prevScale;

        if (sx >= 0 && sx <= width && sy >= 0 && sy <= height) {
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(sx, sy);
          
          let starColor = `rgba(0, 240, 255, ${Math.min(1, 1.5 - star.z)})`;
          if (brakeEnergy > 0.05) {
            starColor = `rgba(255, 40, 80, ${Math.min(1, 1.5 - star.z)})`;
          } else if (slowMoEnergy > 0.05) {
            starColor = `hsla(${(frame + star.z * 120) % 360}, 100%, 75%, ${Math.min(1, 1.5 - star.z)})`;
          }
          
          ctx.strokeStyle = starColor;
          ctx.lineWidth = Math.max(1, starScale * 0.5);
          ctx.stroke();
        }
      });

      // --- Rendering Phase 1.5: Shift Spark Vectors ---
      for (let i = shiftSparks.length - 1; i >= 0; i--) {
        let p = shiftSparks[i];
        
        p.z -= speedModifier * 4; 
        p.x += p.vx * (1 - slowMoEnergy * 0.4);
        p.y += p.vy * (1 - slowMoEnergy * 0.4);

        p.vx *= 0.96;
        p.vy *= 0.96;

        let pScale = 1.5 / p.z;
        let px = horizonX + p.x * pScale;
        let py = horizonY + p.y * pScale;

        if (p.z <= 0.05 || px < 0 || px > width || py < 0 || py > height) {
          shiftSparks.splice(i, 1);
          continue;
        }

        let finalAlpha = p.alpha * (1 - p.z / 1.5) * slowMoEnergy;

        if (i > 0 && slowMoEnergy > 0.5) {
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(horizonX + shiftSparks[i-1].x * pScale, horizonY + shiftSparks[i-1].y * pScale);
          ctx.strokeStyle = `rgba(255, 255, 255, ${finalAlpha * 0.2})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }

        ctx.fillStyle = `hsla(${p.hue}, 100%, 75%, ${finalAlpha})`;
        ctx.beginPath();
        ctx.arc(px, py, Math.max(0.6, p.size * pScale), 0, Math.PI * 2);
        ctx.fill();
      }

      // --- Rendering Phase 2: Core 3D Geometry Rings ---
      for (let i = maxRings - 1; i >= 0; i--) {
        let ring = rings[i];
        ring.z -= speedModifier;
        if (ring.z <= 0) ring.z = 1.5;

        let zoomFactor = 1.1 + (warpEnergy * 1.0) - (brakeEnergy * 0.5) + (Math.sin(frame * 0.03 + i * 0.1) * 0.05 * slowMoEnergy);
        let scale = zoomFactor / ring.z;
        let radius = 55 * scale;

        let targetX = width / 2 + (mouse.x - width / 2) * (1 - ring.z * (0.75 - brakeEnergy * 0.25));
        let targetY = height / 2 + (mouse.y - height / 2) * (1 - ring.z * (0.75 - brakeEnergy * 0.25));

        let hue = (i * 7 + frame * 2.5) % 360;
        let saturation = 100;
        let lightness = 60;

        if (warpEnergy > 0.1) {
          hue = 190 + (hue * 0.07);
          lightness += warpEnergy * 30;
        }
        if (slowMoEnergy > 0.1) {
          hue = (hue + frame * 0.6) % 360; 
          saturation = 95;
        }
        if (brakeEnergy > 0.1) {
          hue = 350 + (hue * 0.05); 
          lightness = 45 + (brakeEnergy * 20);
        }

        let strokeColor = `hsla(${hue}, ${saturation}%, ${lightness}%, ${1 - ring.z / 1.5})`;

        const renderRingInstance = (rMultiplier, spinDir) => {
          ctx.beginPath();
          for (let j = 0; j <= segments; j++) {
            let spinAngle = frame * (0.003 + warpEnergy * 0.01 - brakeEnergy * 0.004) * (1.5 - ring.z) * spinDir;
            let angle = (j / segments) * Math.PI * 2 + spinAngle;

            let currentRadius = radius * rMultiplier;
            if (brakeEnergy > 0.05) {
              currentRadius += Math.sin(frame * 0.2 + i) * (15 * brakeEnergy);
            }

            let currX = targetX + Math.cos(angle) * currentRadius;
            let currY = targetY + Math.sin(angle) * currentRadius;

            if (j === 0) ctx.moveTo(currX, currY);
            else ctx.lineTo(currX, currY);
          }
          ctx.closePath();
          ctx.strokeStyle = strokeColor;
          ctx.lineWidth = Math.max(0.8, (3.0 + (warpEnergy * 4) + (brakeEnergy * 3)) * (1 - ring.z / 1.5) * rMultiplier);
          ctx.stroke(); 
        };

        // Output core geometries onto rendering frames natively
        renderRingInstance(1.0, 1);
