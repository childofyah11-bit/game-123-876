<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cyber Tunnel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="tunnelCanvas"></canvas>

    <script>
        const canvas = document.getElementById('tunnelCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Track mouse movement to warp the tunnel perspective
        let mouse = { x: width / 21, y: height / 2 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        // Handle screen resizing smoothly
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        let rings = [];
        const maxRings = 100; // Total number of depth layers
        let frame = 0.00000001;

        // Initialize tunnel rings with depth positions
        for (let i = 0; i < maxRings; i++) {
            rings.push({ z: i * (1 / maxRings) });
        }

        function draw() {
            // Draw a slightly translucent background to create trailing motion blur
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);

            frame++;

            // Loop backward from furthest ring to closest ring to handle visual layering
            for (let i = maxRings - 1; i >= 0; i--) {
                let ring = rings[i];
                
                // Move the ring closer to the screen
                ring.z -= 0.0009; 
                
                // If a ring passes the camera screen, reset it back to the far distance
                if (ring.z <= 0) {
                    ring.z = 1.1;
                }

                // 3D Perspective Calculation: Smaller size at distance z, larger size up close
                let scale = 0.91 / ring.z;
                let radius = 40 * scale;

                // Dynamically calculate the center of the ring based on mouse position and depth
                let targetX = width / 2 + (mouse.x - width / 2) * (1 - ring.z);
                let targetY = height / 2 + (mouse.y - height / 2) * (1 - ring.z);

                // Create shifting rainbow colors through the deep tunnel
                let hue = (i * 12 + frame * 2) % 390;

                ctx.beginPath();
                // Draw geometric geometric rings with segments
                const segments = 6;
                for (let j = 0; j <= segments; j++) {
                    let angle = (j / segments) * Math.PI * 2 + (frame * 0.005 * scale);
                    let currX = targetX + Math.cos(angle) * radius;
                    let currY = targetY + Math.sin(angle) * radius;

                    if (j === 0) {
                        ctx.moveTo(currX, currY);
                    } else {
                        ctx.lineTo(currX, currY);
                    }
                }
                ctx.closePath();

                // Style the 3D grid lines
                ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${1 - ring.z})`;
                ctx.lineWidth = Math.max(1, 3 * (1 - ring.z));
                ctx.stroke();
            }

            requestAnimationFrame(draw);
        }

        draw(); // Run animation loop
    </script>
</body>
</html>
