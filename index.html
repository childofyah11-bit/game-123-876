<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>game link</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #030308;
            --panel: #0a0b12;
            --border: #1a1d36;
            --accent: #00ffaa;
            --accent2: #9d4edd;
            --text: #c5cbe3;
            --system: #565f89;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Share Tech Mono', monospace;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            text-shadow: 0 0 12px rgba(0, 255, 170, 0.4);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 2px;
        }
        .main-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 800px;
            width: 100%;
            margin-top: 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 55px);
            grid-template-rows: repeat(10, 55px);
            gap: 6px;
            margin: 15px 0;
            background: #020205;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .cell {
            background: #0e101f;
            border: 1px solid #16192e;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: background 0.1s, transform 0.1s;
        }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 180px; margin-top: 10px; }
        .controls button { margin: 0; padding: 14px; background: #16192e; border: 1px solid var(--border); color: white; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .controls button:hover { background: #222744; }
        .status-header { font-size: 15px; color: #8b949e; letter-spacing: 1px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase;}
    </style>
    <!-- Public server connection client network asset library -->
    <script src="https://unpkg.com"></script>
</head>
<body>

    <h1>🌌 Cosmic Nexus: Sector Control</h1>
    <div style="font-size: 14px; color: var(--system); margin-bottom: 10px;">Instant Global Matchmaking Arena</div>

    <!-- Main Live Interactive Grid Panel -->
    <div class="main-layout" id="gameScreen">
        <div class="status-header" id="syncStatus">Initializing secure global orbit telemetry...</div>
        <div class="grid" id="matrixContainer"></div>
        <div class="controls">
            <div></div><button onclick="triggerShift(0, -1)">▲</button><div></div>
            <button onclick="triggerShift(-1, 0)">◀</button><div></div><button onclick="triggerShift(1, 0)">▶</button>
            <div></div><button onclick="triggerShift(0, 1)">▼</button><div></div>
        </div>
    </div>

<script>
    let networkClient = null;
    // Automatically generate a random pilot number so you drop in instantly
    const currentCallsign = "Pilot_" + Math.floor(Math.random() * 9000 + 1000);
    // Hardcode a single global room key so everyone drops into the exact same server map lane
    const targetTopicLane = `cosmicnexus/sectors/global-nexus-arena`;
    
    let localX = Math.floor(Math.random() * 10);
    let localY = Math.floor(Math.random() * 10);
    let sessionUserList = {};

    // Auto-run connection routing immediately on page footprint mount
    window.addEventListener('DOMContentLoaded', () => {
        buildInteractiveGrid();
        connectToRelayNetwork();
    });

    function connectToRelayNetwork() {
        // Connect over free public HiveMQ open web broker layer automatically
        networkClient = mqtt.connect('wss://://hivemq.com');

        networkClient.on('connect', () => {
            document.getElementById('syncStatus').innerText = `GLOBAL ARENA ACTIVE | Call-sign: ${currentCallsign}`;
            
            // Subscribe to the unified room lane updates
            networkClient.subscribe(targetTopicLane);
            
            // Instantly announce presence to players already inside the channel space
            sendNetworkPulse('join', `connected`);
        });

        networkClient.on('message', (topic, message) => {
            try {
                const packet = JSON.parse(message.toString());
                if(packet.sender === currentCallsign) return; // Skip echo reflections

                if(packet.action === 'join' || packet.action === 'sync' || packet.action === 'move') {
                    sessionUserList[packet.sender] = { x: packet.gridX, y: packet.gridY, activeTime: Date.now() };
                    renderPositions();
                    if(packet.action === 'join') {
                        // Respond back with position metrics to register instantly on the newcomer's browser tab
                        sendNetworkPulse('sync', 'updating matrix positioning data');
                    }
                }
            } catch(err) {
                // Ignore unexpected stream garbage safely
            }
        });

        // Loop to prune disconnected players (inactive for 12 seconds)
        setInterval(() => {
            let cutoff = Date.now() - 12000;
            let changed = false;
            Object.keys(sessionUserList).forEach(user => {
                if(sessionUserList[user].activeTime < cutoff) {
                    delete sessionUserList[user];
                    changed = true;
                }
            });
            if(changed) renderPositions();
        }, 4000);
    }

    function buildInteractiveGrid() {
        const grid = document.getElementById('matrixContainer');
        grid.innerHTML = "";
        for (let y = 0; y < 10; y++) {
            for (let x = 0; x < 10; x++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `grid-sector-${x}-${y}`;
                grid.appendChild(cell);
            }
        }
        renderPositions();
    }

    function renderPositions() {
        document.querySelectorAll('.cell').forEach(c => {
            c.innerText = "";
            c.style.background = "#0e101f";
            c.style.borderColor = "#16192e";
            c.style.transform = "scale(1)";
        });

        // Pin local coordinate entity profile
        const localCell = document.getElementById(`grid-sector-${localX}-${localY}`);
        if(localCell) {
            localCell.innerText = "🛸";
            localCell.style.background = "rgba(0, 255, 170, 0.15)";
            localCell.style.borderColor = "var(--accent)";
            localCell.style.transform = "scale(1.05)";
        }

        // Pin mapped online player assets
        Object.keys(sessionUserList).forEach(user => {
            const data = sessionUserList[user];
            const peerCell = document.getElementById(`grid-sector-${data.x}-${data.y}`);
            if(peerCell) {
                peerCell.innerText = "👾";
                peerCell.style.background = "rgba(157, 78, 221, 0.15)";
                peerCell.style.borderColor = "var(--accent2)";
            }
        });
    }

    function triggerShift(dx, dy) {
        let nextX = Math.max(0, Math.min(9, localX + dx));
        let nextY = Math.max(0, Math.min(9, localY + dy));
        if(nextX !== localX || nextY !== localY) {
            localX = nextX;
            localY = nextY;
            renderPositions();
            sendNetworkPulse('move', 'adjusted coordinates');
        }
    }

    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if(key === 'w' || key === 'arrowup') triggerShift(0, -1);
        if(key === 'a' || key === 'arrowleft') triggerShift(-1, 0);
        if(key === 's' || key === 'arrowdown') triggerShift(0, 1);
        if(key === 'd' || key === 'arrowright') triggerShift(1, 0);
    });

    function sendNetworkPulse(actionType, detailText) {
        if(!networkClient || !networkClient.connected) return;
        const payload = {
            sender: currentCallsign,
            action: actionType,
            payloadText: detailText,
            gridX: localX,
            gridY: localY,
            timestamp: Date.now()
        };
        networkClient.publish(targetTopicLane, JSON.stringify(payload));
    }
</script>
</body>
</html>
