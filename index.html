<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    body { 
      background: #010103; 
      overflow: hidden; 
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { 
      display: block; 
      width: 100vw; 
      height: 100vh; 
    }
  </style>
</head>
<body>
  <canvas id="hypnoCanvas"></canvas>

  <script>
    const canvas = document.getElementById('hypnoCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    let mouse = { x: width / 2, y: height / 2, targetX: width / 2, targetY: height / 2 };

    window.addEventListener('mousemove', (e) => {
      mouse.targetX = e.clientX;
      mouse.targetY = e.clientY;
    });

    window.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        mouse.targetX = e.touches[0].clientX;
        mouse.targetY = e.touches[0].clientY;
      }
    }, { passive: true });

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    // --- Interactive Fluid Modifiers ---
    let clickCount = 0;
    let clickTimer = null;
    let warpEnergy = 0;   
    let brakeEnergy = 0;  
    let slowMoEnergy = 0; 

    let isWarpActive = false;
    let isSpacePressed = false;
    let isShiftPressed = false;

    window.addEventListener('click', () => {
      clickCount++;
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => { clickCount = 0; }, 400);
      if (clickCount === 3) {
        isWarpActive = true;
        clickCount = 0;
        setTimeout(() => { isWarpActive = false; }, 4000);
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); isSpacePressed = true; }
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') { isShiftPressed = true; }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space') isSpacePressed = false;
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') isShiftPressed = false;
    });

    // --- Hypnotic Configuration Properties ---
    let frame = 0;
    const totalRings = 95; // Increased rendering layers for a smoother depth transition profile

    function draw() {
      // Smoothly process tracking coordinates to guarantee flow fluidity
      mouse.x += (mouse.targetX - mouse.x) * 0.04;
      mouse.y += (mouse.targetY - mouse.y) * 0.04;

      warpEnergy += ((isWarpActive ? 1 : 0) - warpEnergy) * 0.03;
      brakeEnergy += ((isSpacePressed ? 1 : 0) - brakeEnergy) * 0.08;
      slowMoEnergy += ((isShiftPressed ? 1 : 0) - slowMoEnergy) * 0.06;

      // Soft trailing motion blur values prevent long-term retinal fatigue
      let fadeAlpha = 0.05 + (brakeEnergy * 0.12) - (warpEnergy * 0.02);
      ctx.fillStyle = `rgba(1, 1, 3, ${Math.max(0.015, Math.min(0.25, fadeAlpha))})`;
      ctx.fillRect(0, 0, width, height);

      let speedFactor = 1.0 + (warpEnergy * 2.2) - (slowMoEnergy * 0.7);
      frame += 0.015 * speedFactor;

      // Localized breathing pattern tracks camera oscillations gently
      let cameraBreatheX = Math.sin(frame * 0.4) * 15;
      let cameraBreatheY = Math.cos(frame * 0.3) * 15;
      let centerX = width / 2 + (mouse.x - width / 2) * (0.25 + brakeEnergy * 0.35) + cameraBreatheX;
      let centerY = height / 2 + (mouse.y - height / 2) * (0.25 + brakeEnergy * 0.35) + cameraBreatheY;

      // Deep Cosmic Nebula Star Layer
      ctx.fillStyle = `rgba(255, 255, 255, ${0.25 * (1 - slowMoEnergy)})`;
      for (let s = 0; s < 45; s++) {
        let starAngle = (s * 17.7 + frame * 0.06) % (Math.PI * 2);
        let starRadius = ((s * 22 + frame * 75) % (Math.max(width, height) * 0.85));
        let sx = centerX + Math.cos(starAngle) * starRadius;
        let sy = centerY + Math.sin(starAngle) * starRadius;
        
        // Stars breathe and twinkle naturally based on localized radial distances
        let sizePulse = 0.6 + Math.sin(frame * 2 + s) * 0.5;
        ctx.fillRect(sx, sy, sizePulse, sizePulse);
      }

      // Main Kaleidoscope Layer Generation Loop
      for (let i = totalRings; i > 0; i--) {
        let progress = (i * 0.025 - frame * 0.6) % 1;
        if (progress < 0) progress += 1;

        // Exponential perspective distribution smooths depth movement jumps
        let scale = Math.pow(1 - progress, 3.5);
        let radius = scale * Math.max(width, height) * (1.3 + warpEnergy * 0.7);
        
        if (radius < 3) continue;

        // Multi-layered chaotic wave matrices warp layouts organically
        let waveMultiplier = 35 + brakeEnergy * 90;
        let waveOffsetA = Math.sin(progress * 9 - frame * 2.5) * waveMultiplier;
        let waveOffsetB = Math.cos(progress * 14 + frame * 1.8) * (waveMultiplier * 0.5);

        let currentX = centerX + Math.cos(frame * 0.5 + progress * 3) * waveOffsetA + Math.sin(frame * 0.3) * waveOffsetB;
        let currentY = centerY + Math.sin(frame * 0.5 + progress * 3) * waveOffsetA + Math.cos(frame * 0.3) * waveOffsetB;

        // Soft gradient calculation pipeline limits blinding neon spikes
        let hue = (progress * 360 + frame * 35) % 360;
        let saturation = 95 - (brakeEnergy * 25);
        let lightness = 52 + Math.sin(progress * Math.PI * 2 - frame * 2) * 12;

        if (warpEnergy > 0.1) {
          hue = (hue * 0.15 + 190) % 360; 
          lightness += warpEnergy * 15;
        }
        if (slowMoEnergy > 0.1) {
          hue = (hue * 0.08 + 140) % 360; 
        }

        ctx.strokeStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${progress * (1 - progress * 0.3)})`;
        ctx.lineWidth = Math.max(0.6, scale * (4.5 + warpEnergy * 7));

        // --- Render Organic Bezier Ribbon Ribs ---
        let nodes = 5; 
        ctx.beginPath();
        
        let startAngle = frame * 0.1 * (1 - progress);
        let firstX = currentX + Math.cos(startAngle) * radius;
        let firstY = currentY + Math.sin(startAngle) * radius;
        ctx.moveTo(firstX, firstY);

        for (let j = 1; j <= nodes; j++) {
          let rotationalSpin = frame * 0.12 * (1 + warpEnergy * 0.5) * (1 - progress);
          let angleA = ((j - 1) / nodes) * Math.PI * 2 + rotationalSpin;
          let angleB = (j / nodes) * Math.PI * 2 + rotationalSpin;
          
          let pA_x = currentX + Math.cos(angleA) * radius;
          let pA_y = currentY + Math.sin(angleA) * radius;
          let pB_x = currentX + Math.cos(angleB) * radius;
          let pB_y = currentY + Math.sin(angleB) * radius;

          // Compute control vectors dynamically to generate smooth curving lines
          let controlAngle = angleA + (angleB - angleA) / 2 + Math.sin(frame + i) * 0.1;
          let controlRadius = radius * (1.05 + Math.sin(frame * 2 + j) * 0.08 * (1 - slowMoEnergy));
          let cpX = currentX + Math.cos(controlAngle) * controlRadius;
          let cpY = currentY + Math.sin(controlAngle) * controlRadius;

          ctx.quadraticCurveTo(cpX, cpY, pB_x, pB_y);
        }
        ctx.stroke();

        // Secondary Counter-Rotating Hypnotic Concentric Veil Track
        if (progress > 0.25 && progress < 0.85) {
          ctx.beginPath();
          let innerRadius = radius * (0.35 + Math.sin(frame * 1.5 + i * 0.05) * 0.04);
          ctx.arc(currentX, currentY, innerRadius, 0, Math.PI * 2);
          
          let innerHue = (hue + 160) % 360; // Complementary spectral mapping balance
          ctx.strokeStyle = `hsla(${innerHue}, 90%, 48%, ${progress * 0.18})`;
          ctx.lineWidth = 0.5 + scale * 1.5;
          ctx.stroke();
        }
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
