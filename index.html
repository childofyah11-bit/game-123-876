<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Mesh Arena</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #05050d;
            --panel: #0b0c16;
            --border: #1f2335;
            --accent: #00ffff;
            --accent2: #ff007f;
            --text: #a9b1d6;
            --green: #73daca;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Share Tech Mono', monospace;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }
        .setup-panel {
            background: var(--panel);
            border: 2px solid var(--border);
            padding: 25px;
            border-radius: 12px;
            max-width: 450px;
            width: 100%;
            margin-top: 40px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1b26;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
        }
        button {
            background: linear-gradient(90deg, var(--accent2), #bc00dd);
            cursor: pointer;
            font-weight: bold;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .main-layout {
            display: none;
            gap: 25px;
            max-width: 1100px;
            width: 100%;
            margin-top: 15px;
        }
        .game-column {
            flex: 1.8;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(9, 50px);
            grid-template-rows: repeat(9, 50px);
            gap: 5px;
            margin: 20px 0;
            background: #020205;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .cell {
            background: #121324;
            border: 1px solid #1a1b26;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.15s;
        }
        .chat-column {
            flex: 1.2;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 560px;
        }
        .chat-box {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border);
            background: #020205;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        .chat-msg {
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }
        .chat-user { color: var(--accent); font-weight: bold; }
        .chat-peer { color: var(--accent2); font-weight: bold; }
        .chat-system { color: #565f89; font-style: italic; }
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: 160px;
        }
        .controls button { margin: 0; padding: 10px; background: #1f2335; border: 1px solid var(--border); }
        .status-tag {
            font-size: 13px;
            color: var(--green);
            background: rgba(115, 218, 202, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(115, 218, 202, 0.2);
            margin-bottom: 15px;
        }
    </style>
    <!-- Include free public scaling signaling backend library -->
    <script src="https://unpkg.com"></script>
</head>
<body>

    <h1>🌌 Quantum Mesh Arena</h1>
    <div style="font-size: 14px; color: #565f89;">Direct Peer-to-Peer Grid Interface & Messaging Pipeline</div>

    <!-- Connection Orchestration Screen Layout -->
    <div class="setup-panel" id="setupSection">
        <h3 style="color:white; margin-top:0;">📡 Initialize Quantum Link</h3>
        <input type="text" id="aliasInput" placeholder="Enter Your Callsign (e.g., Pilot_X)">
        <input type="text" id="roomInput" placeholder="Create or Join Room Key (e.g., sector-9)">
        <button onclick="bootMeshEngine()">Connect Telemetry</button>
        <p style="font-size: 12px; color: #565f89; margin-top: 15px;">Share your Room Key with a friend. Once you both join the same key, your nodes sync automatically.</p>
    </div>

    <!-- Active Gameplay Layout -->
    <div class="main-layout" id="arenaLayout">
        <div class="game-column">
            <div class="status-tag" id="networkStatus">Status: Synchronizing local proxy...</div>
            <div class="grid" id="matrixGrid"></div>
            <div class="controls">
                <div></div><button onclick="executeMovement(0, -1)">▲</button><div></div>
                <button onclick="executeMovement(-1, 0)">◀</button><div></div><button onclick="executeMovement(1, 0)">▶</button>
                <div></div><button onclick="executeMovement(0, 1)">▼</button><div></div>
            </div>
        </div>
        <div class="chat-column">
            <h3 style="margin-top:0; color:white; font-size:16px;">📟 Sub-Space Comms</h3>
            <div class="chat-box" id="msgBox"></div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="textInput" placeholder="Type encryption message..." onkeydown="if(event.key==='Enter') pushTextMessage()">
                <button style="width:90px; margin:0;" onclick="pushTextMessage()">Send</button>
            </div>
        </div>
    </div>

<script>
    let peerInstance = null;
    let peerConnection = null;
    let localAlias = "";
    let TargetRoomKey = "";
    
    let localX = Math.floor(Math.random() * 9);
    let localY = Math.floor(Math.random() * 9);
    const localEmoji = "🛸";
    
    let remotePlayers = {};

    function bootMeshEngine() {
        localAlias = document.getElementById('aliasInput').value.trim() || "Pilot_" + Math.floor(Math.random()*900+100);
        TargetRoomKey = document.getElementById('roomInput').value.trim().toLowerCase();

        if(!TargetRoomKey) {
            alert("❌ A distinct Room Key signature is required to open an transmission link.");
            return;
        }

        document.getElementById('setupSection').style.display = 'none';
        document.getElementById('arenaLayout').style.display = 'flex';
        
        buildGridMatrix();

        // Initialize PeerJS over open cloud relay infrastructure
        // Room validation routes via unique structured id names: roomKey-alias
        peerInstance = new Peer(`${TargetRoomKey}-${localAlias}`);

        peerInstance.on('open', (id) => {
            document.getElementById('networkStatus').innerText = `Room: ${TargetRoomKey} | Call-sign: ${localAlias}`;
            writeSystemNotice(`Initialized network routing node. Discovering room signals...`);
            
            // Scan for existing peer nodes (Attempt to connect to room anchor)
            scanAndConnectRoom();
        });

        // Handle incoming connection configurations automatically
        peerInstance.on('connection', (conn) => {
            setupConnectionListeners(conn);
        });

        peerInstance.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                alert("❌ Call-sign active in current sector. Change your identifier name.");
                location.reload();
            } else {
                console.error("Mesh tracking anomaly encountered:", err);
            }
        });
    }

    function buildGridMatrix() {
        const grid = document.getElementById('matrixGrid');
        grid.innerHTML = "";
        for (let y = 0; y < 9; y++) {
            for (let x = 0; x < 9; x++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${x}-${y}`;
                grid.appendChild(cell);
            }
        }
        refreshGridPositions();
    }

    function refreshGridPositions() {
        document.querySelectorAll('.cell').forEach(c => {
            c.innerText = "";
            c.style.boxShadow = "none";
        });

        // Set local target indicator position
        const localCell = document.getElementById(`cell-${localX}-${localY}`);
        if(localCell) {
            localCell.innerText = localEmoji;
            localCell.style.boxShadow = "inset 0 0 8px #00ffff";
        }

        // Map relative remote player entities
        Object.keys(remotePlayers).forEach(peerName => {
