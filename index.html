<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>/</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    body { 
      background: #000; 
      overflow: hidden; 
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { 
      display: block; 
      width: 100vw; 
      height: 100vh; 
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="tunnelCanvas"></canvas>

  <script>
    const canvas = document.getElementById('tunnelCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); 

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    let mouse = { x: width / 2, y: height / 2, targetX: width / 2, targetY: height / 2 };

    const updatePointer = (clientX, clientY) => {
      mouse.targetX = clientX;
      mouse.targetY = clientY;
    };

    window.addEventListener('mousemove', (e) => updatePointer(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) updatePointer(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    // --- Core State Machine & Combo Metrics ---
    let clickCount = 0;
    let clickTimer = null;
    let isWarpActive = false;
    let isSpacePressed = false;
    let isShiftPressed = false;

    // Smooth Interpolation Energy Mixers
    let warpEnergy = 0;   // Animates from 0 to 1 (Triple Click)
    let brakeEnergy = 0;  // Animates from 0 to 1 (Spacebar)
    let slowMoEnergy = 0; // Animates from 0 to 1 (Shift Key)

    const handleInteraction = () => {
      clickCount++;
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => { clickCount = 0; }, 400);

      if (clickCount === 3) {
        isWarpActive = true;
        clickCount = 0;
        setTimeout(() => { isWarpActive = false; }, 3500);
      }
    };

    window.addEventListener('click', handleInteraction);
    window.addEventListener('touchstart', (e) => {
      if(e.touches.length > 0) updatePointer(e.touches[0].clientX, e.touches[0].clientY);
      handleInteraction();
    }, { passive: true });

    // --- Key Input Matrix Handlers ---
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault(); 
        isSpacePressed = true;
      }
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
        isShiftPressed = true;
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        isSpacePressed = false;
      }
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
        isShiftPressed = false;
      }
    });

    // --- Engine Configuration Core ---
    const maxRings = 50; 
    const segments = 8; 
    let rings = [];
    let frame = 0;

    for (let i = 0; i < maxRings; i++) {
      rings.push({ z: (i / maxRings) * 1.2 });
    }

    const spaceStars = Array.from({ length: 85 }, () => ({
      x: (Math.random() - 0.5) * 1000,
      y: (Math.random() - 0.5) * 1000,
      z: Math.random() * 1.2
    }));

    // --- Hidden Shift Spark Pool Engine ---
    let shiftSparks = [];

    function spawnShiftSparks() {
      // Spawn bursts continuously while slow-mo engine energy steps up
      if (Math.random() < 0.4) {
        for (let s = 0; s < 5; s++) {
          let angle = Math.random() * Math.PI * 2;
          let speed = 2 + Math.random() * 6;
          shiftSparks.push({
            x: 0, // Starts at exact center horizon
            y: 0,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            z: 1.2, // Starts deep in the background
            size: 2 + Math.random() * 3,
            hue: 100 + Math.random() * 50, // Cyber Matrix Greens
            alpha: 1
          });
        }
      }
    }

    function draw() {
      mouse.x += (mouse.targetX - mouse.x) * 0.1;
      mouse.y += (mouse.targetY - mouse.y) * 0.1;

      // Smoothly interpolate active layout metric modifier values
      warpEnergy += ((isWarpActive ? 1 : 0) - warpEnergy) * 0.05;
      brakeEnergy += ((isSpacePressed ? 1 : 0) - brakeEnergy) * 0.15;
      slowMoEnergy += ((isShiftPressed ? 1 : 0) - slowMoEnergy) * 0.1;

      // Calculate speed dynamically using space emergency breaks and chrono-shifts
      let baseSpeed = 0.0012;
      let targetSpeed = baseSpeed + (warpEnergy * 0.015);
      targetSpeed *= (1 - brakeEnergy * 0.9);   
      targetSpeed *= (1 - slowMoEnergy * 0.8);  

      let speedModifier = targetSpeed;

      // Trailing backdrop computation adjustments based on active mechanics
      let trailingBlur = 0.16 - (warpEnergy * 0.08) + (brakeEnergy * 0.12);
      ctx.fillStyle = `rgba(0, 0, 0, ${Math.max(0.05, Math.min(0.4, trailingBlur))})`;
      ctx.fillRect(0, 0, width, height);

      // Increment global frame tracking scaled by time-dilation constraints
      frame += 1 * (1 - slowMoEnergy * 0.7);

      // Spawn particles dynamically if Shift key tracking state registers high values
      if (slowMoEnergy > 0.1) {
        spawnShiftSparks();
      }

      // Phase 1: Star Vectors Deep Layer
      spaceStars.forEach(star => {
        star.z -= speedModifier * 2.2;
        if (star.z <= 0) {
          star.z = 1.2;
          star.x = (Math.random() - 0.5) * 1000;
          star.y = (Math.random() - 0.5) * 1000;
        }

        let starScale = 1.2 / star.z;
        let sx = width / 2 + (star.x + (mouse.x - width / 2) * -0.4) * starScale;
        let sy = height / 2 + (star.y + (mouse.y - height / 2) * -0.4) * starScale;

        let prevZ = star.z + (speedModifier * 2.2);
        let prevScale = 1.2 / prevZ;
        let px = width / 2 + (star.x + (mouse.x - width / 2) * -0.4) * prevScale;
        let py = height / 2 + (star.y + (mouse.y - height / 2) * -0.4) * prevScale;

        if (sx >= 0 && sx <= width && sy >= 0 && sy <= height) {
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(sx, sy);
          
          let starColor = `rgba(0, 243, 255, ${Math.min(1, 1.2 - star.z)})`;
          if (brakeEnergy > 0.05) {
            starColor = `rgba(255, ${40 * (1 - brakeEnergy)}, ${40 * (1 - brakeEnergy)}, ${Math.min(1, 1.2 - star.z)})`;
          }
          
          ctx.strokeStyle = starColor;
          ctx.lineWidth = Math.max(1, starScale * 0.4);
          ctx.stroke();
        }
      });

      // Phase 1.5: Render Hidden Chrono-Spark Particles
      // Center convergence shifts cleanly alongside active mouse trackings
      let horizonX = width / 2 + (mouse.x - width / 2) * 0.25;
      let horizonY = height / 2 + (mouse.y - height / 2) * 0.25;

      for (let i = shiftSparks.length - 1; i >= 0; i--) {
        let p = shiftSparks[i];
        
        // Move particle out toward camera screen space planes
        p.z -= speedModifier * 3.5; 
        p.x += p.vx * (1 - slowMoEnergy * 0.5);
        p.y += p.vy * (1 - slowMoEnergy * 0.5);

        // Slow down particle drift over frame iterations
        p.vx *= 0.98;
        p.vy *= 0.98;

        let pScale = 1.2 / p.z;
        let px = horizonX + p.x * pScale;
        let py = horizonY + p.y * pScale;

        // Decay particle rendering visibility if it moves past camera lens space
        if (p.z <= 0.1 || px < 0 || px > width || py < 0 || py > height) {
          shiftSparks.splice(i, 1);
          continue;
        }

        // Fade away naturally if user lets go of Shift key early
        let finalAlpha = p.alpha * (1 - p.z / 1.2) * slowMoEnergy;

        ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${finalAlpha})`;
        ctx.beginPath();
        ctx.arc(px, py, Math.max(0.5, p.size * pScale), 0, Math.PI * 2);
        ctx.fill();
      }

      // Phase 2: Render Geometric Topology Loops
      for (let i = maxRings - 1; i >= 0; i--) {
        let ring = rings[i];
        ring.z -= speedModifier;
        if (ring.z <= 0) ring.z = 1.2;

        let zoomFactor = 0.95 + (warpEnergy * 0.8) - (brakeEnergy * 0.45);
        let scale = zoomFactor / ring.z;
        let radius = 45 * scale;

        let targetX = width / 2 + (mouse.x - width / 2) * (1 - ring.z * (0.75 - brakeEnergy * 0.2));
        let targetY = height / 2 + (mouse.y - height / 2) * (1 - ring.z * (0.75 - brakeEnergy * 0.2));

        let hue = (i * 8 + frame * 2.5) % 360;
        let saturation = 100;
        let lightness = 65;

        if (warpEnergy > 0.1) {
          hue = 180 + (hue * 0.1);
          lightness += warpEnergy * 35;
        }
        if (slowMoEnergy > 0.1) {
          hue = 120 + (hue * 0.05); 
          lightness = 50 + (slowMoEnergy * 15);
        }
        if (brakeEnergy > 0.1) {
          hue = 0 + (hue * 0.05); 
          lightness = 45 + (brakeEnergy * 20);
        }

        let strokeColor = `hsla(${hue}, ${saturation}%, ${lightness}%, ${1 - ring.z / 1.2})`;

        ctx.beginPath();
        for (let j = 0; j <= segments; j++) {
          let spinAngle = frame * (0.003 + warpEnergy * 0.008 - brakeEnergy * 0.002) * (1.2 - ring.z);
          let angle = (j / segments) * Math.PI * 2 + spinAngle;

          let currentRadius = radius;
          if (brakeEnergy > 0.05) {
            currentRadius += Math.sin(frame * 0.1 + i) * (8 * brakeEnergy);
          }

          let currX = targetX + Math.cos(angle) * currentRadius;
          let currY = targetY + Math.sin(angle) * currentRadius;

          if (j === 0) ctx.moveTo(currX, currY);
          else ctx.lineTo(currX, currY);
        }
        ctx.closePath();

        ctx.strokeStyle = strokeColor;
