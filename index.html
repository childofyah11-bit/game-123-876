<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Nexus: Orbit Link</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #030308;
            --panel: #0a0b12;
            --border: #1a1d36;
            --accent: #00ffaa;
            --accent2: #9d4edd;
            --text: #c5cbe3;
            --system: #565f89;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Share Tech Mono', monospace;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            text-shadow: 0 0 12px rgba(0, 255, 170, 0.4);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 2px;
        }
        .setup-panel {
            background: var(--panel);
            border: 2px solid var(--border);
            padding: 25px;
            border-radius: 12px;
            max-width: 420px;
            width: 100%;
            margin-top: 50px;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #101222;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: var(--accent); }
        button {
            background: linear-gradient(90deg, var(--accent), #00bfff);
            cursor: pointer;
            font-weight: bold;
            border: none;
            color: #030308;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 0 10px var(--accent); }
        .main-layout {
            display: none;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
            margin-top: 20px;
        }
        .game-column {
            flex: 1.7;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(8, 52px);
            grid-template-rows: repeat(8, 52px);
            gap: 5px;
            margin: 20px 0;
            background: #020205;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .cell {
            background: #0e101f;
            border: 1px solid #16192e;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            transition: background 0.1s;
        }
        .chat-column {
            flex: 1.3;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 560px;
        }
        .chat-box {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border);
            background: #020205;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        .chat-msg { margin-bottom: 10px; font-size: 14px; line-height: 1.4; }
        .chat-user { color: var(--accent); font-weight: bold; }
        .chat-peer { color: var(--accent2); font-weight: bold; }
        .chat-system { color: var(--system); font-style: italic; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 150px; }
        .controls button { margin: 0; padding: 12px; background: #16192e; border: 1px solid var(--border); color: white; }
        .status-header { font-size: 14px; color: #8b949e; margin-bottom: 10px; }
    </style>
    <!-- Public server connection client network asset library library -->
    <script src="https://unpkg.com"></script>
</head>
<body>

    <h1>🌌 Cosmic Nexus: Orbit Link</h1>
    <div style="font-size: 14px; color: var(--system);">Automated Relay Matrix Sandbox Layer</div>

    <!-- Login Matrix Panel -->
    <div class="setup-panel" id="loginScreen">
        <h3 style="color:white; margin-top:0;">📡 Map Server Telemetry</h3>
        <input type="text" id="nameBox" placeholder="Enter Your Callsign (e.g., Pilot_1)">
        <input type="text" id="roomBox" placeholder="Enter Room Key (e.g., alpha-sector)">
        <button onclick="connectToRelayNetwork()">Launch Orbit Link</button>
        <p style="font-size: 12px; color: var(--system); margin-top: 15px;">Type any room name. Tell a friend to type the same room name to connect instantly.</p>
    </div>

    <!-- Main Live Interactive Grid Panel -->
    <div class="main-layout" id="gameScreen">
        <div class="game-column">
            <div class="status-header" id="syncStatus">Syncing tracking vector coordinates...</div>
            <div class="grid" id="matrixContainer"></div>
            <div class="controls">
                <div></div><button onclick="triggerShift(0, -1)">▲</button><div></div>
                <button onclick="triggerShift(-1, 0)">◀</button><div></div><button onclick="triggerShift(1, 0)">▶</button>
                <div></div><button onclick="triggerShift(0, 1)">▼</button><div></div>
            </div>
        </div>
        <div class="chat-column">
            <h3 style="margin-top:0; color:white; font-size:16px;">📟 Orbit Comms Stream</h3>
            <div class="chat-box" id="messageLogs"></div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="msgInput" placeholder="Broadcast encryption packet..." onkeydown="if(event.key==='Enter') dispatchChat()">
                <button style="width:90px; margin:0;" onclick="dispatchChat()">Send</button>
            </div>
        </div>
    </div>

<script>
    let networkClient = null;
    let currentCallsign = "";
    let targetTopicLane = "";
    
    let localX = Math.floor(Math.random() * 8);
    let localY = Math.floor(Math.random() * 8);
    let sessionUserList = {};

    function connectToRelayNetwork() {
        currentCallsign = document.getElementById('nameBox').value.trim() || "Pilot_" + Math.floor(Math.random()*900+100);
        let roomSignature = document.getElementById('roomBox').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '-');

        if(!roomSignature) {
            alert("❌ Please specify a Room Key name to calibrate your telemetry engine.");
            return;
        }

        targetTopicLane = `cosmicnexus/rooms/${roomSignature}`;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'flex';
        
        buildInteractiveGrid();
        logNotice(`Connecting to public matrix relay...`);

        // Connect over free public HiveMQ open web broker layer automatically
        networkClient = mqtt.connect('wss://://hivemq.com');

        networkClient.on('connect', () => {
            document.getElementById('syncStatus').innerText = `Sector: ${roomSignature} | Pilot: ${currentCallsign}`;
            logNotice(`Connection established. Listening to data stream...`);
            
            // Subscribe to room updates
            networkClient.subscribe(targetTopicLane);
            
            // Instantly announce presence
            sendNetworkPulse('join', `has dropped into orbit link sector.`);
        });

        networkClient.on('message', (topic, message) => {
            try {
                const packet = JSON.parse(message.toString());
                if(packet.sender === currentCallsign) return; // Skip echo reflections

                if(packet.action === 'join' || packet.action === 'sync' || packet.action === 'move') {
                    sessionUserList[packet.sender] = { x: packet.gridX, y: packet.gridY, activeTime: Date.now() };
                    renderPositions();
                    if(packet.action === 'join') {
                        logNotice(`${packet.sender} ${packet.payloadText}`);
                        // Respond with position metrics to register on their client
                        sendNetworkPulse('sync', 'updating matrix positioning mapping data');
                    }
                }
                if(packet.action === 'chat') {
                    appendChatMsg(packet.sender, packet.payloadText, false);
                }
            } catch(err) {
                // Ignore unexpected stream garbage safely
            }
        });

        // Loop to prune disconnected players (inactive for 12 seconds)
        setInterval(() => {
            let cutoff = Date.now() - 12000;
            let changed = false;
            Object.keys(sessionUserList).forEach(user => {
                if(sessionUserList[user].activeTime < cutoff) {
                    logNotice(`${user} signaling link went dead.`);
                    delete sessionUserList[user];
                    changed = true;
                }
            });
            if(changed) renderPositions();
        }, 4000);
    }

    function buildInteractiveGrid() {
        const grid = document.getElementById('matrixContainer');
