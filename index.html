<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>game link</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #030308;
            --panel: #0a0b12;
            --border: #1a1d36;
            --accent: #00ffaa;
            --accent2: #ff0055;
            --cyber: #00ffff;
            --text: #c5cbe3;
            --system: #565f89;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Share Tech Mono', monospace;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            overflow: hidden;
            user-select: none;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            text-shadow: 0 0 12px rgba(0, 255, 170, 0.4);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 2px 0;
        }
        .main-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 900px;
            width: 100%;
            margin-top: 10px;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            background: #020205;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: inset 0 0 20px rgba(0,230,184,0.05);
            cursor: crosshair;
        }
        .status-header { 
            font-size: 14px; 
            color: #8b949e; 
            letter-spacing: 1px; 
            margin-bottom: 8px; 
            font-weight: bold; 
            text-transform: uppercase;
            text-align: center;
            width: 100%;
        }
        .hud-overlay {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 880px;
            font-size: 13px;
            color: var(--cyber);
            margin-top: 5px;
        }
    </style>
    <!-- Public server connection client network asset library -->
    <script src="https://unpkg.com"></script>
</head>
<body>

    <h1>🚀 Hyper-Pulse: Strike Fleet</h1>
    <div style="font-size: 13px; color: var(--system); margin-bottom: 5px;">⚡ Real-Time Combat Arena • Instant Global Matchmaking</div>

    <!-- Main Live Interactive Action Arena Panel -->
    <div class="main-layout" id="gameScreen">
        <div class="status-header" id="syncStatus">Calibrating weapons and thrust drive array...</div>
        <canvas id="actionCanvas" width="880" height="500"></canvas>
        <div class="hud-overlay">
            <div>⌨️ WASD / Arrows to Fly • 🖱️ Move Mouse to Aim • Left Click to Fire Plasma</div>
            <div id="playerStats">FRAGS: 0</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('actionCanvas');
    const ctx = canvas.getContext('2d');
    let networkClient = null;

    // Automatically generate unique pilot identities
    const myID = "Pilot_" + Math.floor(Math.random() * 9000 + 1000);
    const targetTopicLane = `hyperpulse/sectors/global-action-arena`;

    // Local Player Configuration Properties
    let player = {
        id: myID,
        x: Math.random() * (canvas.width - 100) + 50,
        y: Math.random() * (canvas.height - 100) + 50,
        vx: 0,
        vy: 0,
        angle: 0,
        speed: 4.5,
        frags: 0,
        color: '#00ffaa'
    };

    // Arrays tracking environmental elements
    let localLasers = [];
    let remotePlayers = {};
    let remoteLasers = [];
    let explosions = [];
    const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
    let mouseX = canvas.width / 2, mouseY = canvas.height / 2;

    // Hook screen events immediately on page mount
    window.addEventListener('DOMContentLoaded', () => {
        setupInputListeners();
        connectToRelayNetwork();
        requestAnimationFrame(gameUpdateLoop);
    });

    function connectToRelayNetwork() {
        // Connect over free public HiveMQ open web broker layer automatically
        networkClient = mqtt.connect('wss://://hivemq.com');

        networkClient.on('connect', () => {
            document.getElementById('syncStatus').innerText = `COMBAT READY | CALLSIGN: ${myID}`;
            networkClient.subscribe(targetTopicLane);
            sendNetworkPulse('spawn', player);
        });

        networkClient.on('message', (topic, message) => {
            try {
                const packet = JSON.parse(message.toString());
                if (packet.sender === myID) return; // Skip loops

                if (packet.action === 'update' || packet.action === 'spawn') {
                    remotePlayers[packet.sender] = {
                        x: packet.data.x,
                        y: packet.data.y,
                        angle: packet.data.angle,
                        frags: packet.data.frags,
                        activeTime: Date.now()
                    };
                    if (packet.action === 'spawn') {
                        sendNetworkPulse('update', player); // Mirror state instantly
                    }
                }
                if (packet.action === 'fire') {
                    remoteLasers.push(packet.data);
                }
                if (packet.action === 'eliminated' && packet.targetId === myID) {
                    triggerRespawn(packet.sender);
                }
            } catch (err) {}
        });

        // Prune disconnected fleets automatically
        setInterval(() => {
            let cutoff = Date.now() - 4000;
            Object.keys(remotePlayers).forEach(user => {
                if (remotePlayers[user].activeTime < cutoff) delete remotePlayers[user];
            });
        }, 2000);
    }

    function setupInputListeners() {
        window.addEventListener('keydown', e => { if (e.key in keys) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if (e.key in keys) keys[e.key] = false; });
        
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', e => {
            if (e.button === 0) firePlasmaLaser();
        });
    }

    function firePlasmaLaser() {
        let laser = {
            id: myID + "_" + Date.now(),
            owner: myID,
            x: player.x,
            y: player.y,
            vx: Math.cos(player.angle) * 12,
            vy: Math.sin(player.angle) * 12,
            life: 45
        };
        localLasers.push(laser);
        sendNetworkPulse('fire', laser);
    }

    function triggerRespawn(attackerName) {
        explosions.push({ x: player.x, y: player.y, radius: 10, maxRadius: 35, alpha: 1 });
        player.x = Math.random() * (canvas.width - 100) + 50;
        player.y = Math.random() * (canvas.height - 100) + 50;
        player.vx = 0;
        player.vy = 0;
        document.getElementById('syncStatus').innerText = `💥 SHIP VAPORIZED BY ${attackerName}! RESPAWNING...`;
        setTimeout(() => {
            document.getElementById('syncStatus').innerText = `COMBAT READY | CALLSIGN: ${myID}`;
        }, 3000);
    }

    // Main Real-Time Simulation Engine Loop
    function gameUpdateLoop() {
        // --- 1. HANDLE LOCAL SIMULATION PHYSICS ---
        player.vx = 0; player.vy = 0;
        if (keys.w || keys.ArrowUp) player.vy = -player.speed;
        if (keys.s || keys.ArrowDown) player.vy = player.speed;
        if (keys.a || keys.ArrowLeft) player.vx = -player.speed;
        if (keys.d || keys.ArrowRight) player.vx = player.speed;

        player.x = Math.max(15, Math.min(canvas.width - 15, player.x + player.vx));
        player.y = Math.max(15, Math.min(canvas.height - 15, player.y + player.vy));
        
        // Track crosshair rotation angle
        player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

        // Network synchronization update tick
        if (networkClient && networkClient.connected && (player.vx !== 0 || player.vy !== 0 || player.angle !== player.lastAngle)) {
            sendNetworkPulse('update', player);
            player.lastAngle = player.angle;
        }

        // Simulating projectiles
        for (let i = localLasers.length - 1; i >= 0; i--) {
            let l = localLasers[i];
            l.x += l.vx; l.y += l.vy; l.life--;
            
            // Validate laser hit box range against remote ships
            Object.keys(remotePlayers).forEach(peer => {
                let p = remotePlayers[peer];
                let dist = Math.sqrt((l.x - p.x) ** 2 + (l.y - p.y) ** 2);
                if (dist < 16) { // Hit confirmed
                    explosions.push({ x: p.x, y: p.y, radius: 5, maxRadius: 25, alpha: 1 });
                    player.frags++;
                    document.getElementById('playerStats').innerText = `FRAGS: ${player.frags}`;
                    if (networkClient) {
                        networkClient.publish(targetTopicLane, JSON.stringify({
                            sender: myID, action: 'eliminated', targetId: peer
                        }));
                    }
                    localLasers.splice(i, 1);
                    return;
                }
            });

            if (l.life <= 0 && localLasers[i]) localLasers.splice(i, 1);
        }
