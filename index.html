<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    body { 
      background: #000; 
      overflow: hidden; 
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { 
      display: block; 
      width: 100vw; 
      height: 100vh; 
    }
  </style>
</head>
<body>
  <canvas id="hypnoCanvas"></canvas>

  <script>
    const canvas = document.getElementById('hypnoCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    let mouse = { x: width / 2, y: height / 2, targetX: width / 2, targetY: height / 2 };

    window.addEventListener('mousemove', (e) => {
      mouse.targetX = e.clientX;
      mouse.targetY = e.clientY;
    });

    window.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        mouse.targetX = e.touches[0].clientX;
        mouse.targetY = e.touches[0].clientY;
      }
    }, { passive: true });

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    // --- Interactive Key/Click Modifiers ---
    let clickCount = 0;
    let clickTimer = null;
    let warpEnergy = 0;   // Triple click trigger
    let brakeEnergy = 0;  // Spacebar hold trigger
    let slowMoEnergy = 0; // Shift key hold trigger

    let isWarpActive = false;
    let isSpacePressed = false;
    let isShiftPressed = false;

    window.addEventListener('click', () => {
      clickCount++;
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => { clickCount = 0; }, 400);
      if (clickCount === 3) {
        isWarpActive = true;
        clickCount = 0;
        setTimeout(() => { isWarpActive = false; }, 4000);
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); isSpacePressed = true; }
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') { isShiftPressed = true; }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space') isSpacePressed = false;
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') isShiftPressed = false;
    });

    // --- Hypnotic Visual Engine ---
    let frame = 0;
    const totalRings = 80; // High count for continuous tunnel density

    function draw() {
      // Smooth tracking interpolation
      mouse.x += (mouse.targetX - mouse.x) * 0.05;
      mouse.y += (mouse.targetY - mouse.y) * 0.05;

      // Energy smoothing transition matrices
      warpEnergy += ((isWarpActive ? 1 : 0) - warpEnergy) * 0.05;
      brakeEnergy += ((isSpacePressed ? 1 : 0) - brakeEnergy) * 0.1;
      slowMoEnergy += ((isShiftPressed ? 1 : 0) - slowMoEnergy) * 0.08;

      // Variable trail fade calculation
      let fadeAlpha = 0.06 + (brakeEnergy * 0.15) - (warpEnergy * 0.03);
      ctx.fillStyle = `rgba(0, 0, 0, ${Math.max(0.02, Math.min(0.3, fadeAlpha))})`;
      ctx.fillRect(0, 0, width, height);

      // System clock speed variables mapped to interaction parameters
      let speedFactor = 1.0 + (warpEnergy * 2.5) - (slowMoEnergy * 0.75);
      frame += 0.02 * speedFactor;

      // Calculate localized vortex center
      let centerX = width / 2 + (mouse.x - width / 2) * (0.3 + brakeEnergy * 0.4);
      let centerY = height / 2 + (mouse.y - height / 2) * (0.3 + brakeEnergy * 0.4);

      // Background Starfield Track Simulation
      ctx.fillStyle = `rgba(255, 255, 255, ${0.3 * (1 - slowMoEnergy)})`;
      for(let s = 0; s < 30; s++) {
        let starAngle = (s * 13.3 + frame * 0.1) % (Math.PI * 2);
        let starRadius = ((s * 25 + frame * 100) % (Math.max(width, height) * 0.8));
        let sx = centerX + Math.cos(starAngle) * starRadius;
        let sy = centerY + Math.sin(starAngle) * starRadius;
        ctx.fillRect(sx, sy, 1.5, 1.5);
      }

      // Main Kaleidoscope Layer Generation Loop
      for (let i = totalRings; i > 0; i--) {
        // Logarithmic scaling calculation simulates natural depth progression
        let depth = i / totalRings;
        let progress = (i * 0.03 - frame) % 1;
        if (progress < 0) progress += 1;

        // Perspective projections
        let scale = Math.pow(1 - progress, 3);
        let radius = scale * Math.max(width, height) * (1.2 + warpEnergy * 0.8);
        
        if (radius < 2) continue;

        // Dynamic multi-axis wave offsets
        let waveOffset = Math.sin(progress * 12 - frame * 4) * (20 + brakeEnergy * 60);
        let currentX = centerX + Math.cos(frame + progress * 4) * waveOffset;
        let currentY = centerY + Math.sin(frame + progress * 4) * waveOffset;

        // Hypnotic spectrum palette calculations
        let hue = (progress * 360 + frame * 50) % 360;
        let saturation = 100 - (brakeEnergy * 30);
        let lightness = 55 + Math.sin(progress * Math.PI - frame) * 15;

        // Color override modifications matching modifier matrix states
        if (warpEnergy > 0.1) {
          hue = (hue * 0.2 + 180) % 360; // Shifting toward bright cyber cyans
          lightness += warpEnergy * 20;
        }
        if (slowMoEnergy > 0.1) {
          hue = (hue * 0.1 + 120) % 360; // Shifting toward vibrant matrix greens
        }

        ctx.strokeStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${progress})`;
        ctx.lineWidth = Math.max(0.5, scale * (4 + warpEnergy * 8));

        // Render Geometry Node Configuration
        let nodes = 4 + Math.floor(4 * (1 - slowMoEnergy)); // Intercept shapes cleanly on modifier updates
        ctx.beginPath();
        for (let j = 0; j <= nodes; j++) {
          let rotationalSpin = frame * 0.2 * (1 + warpEnergy) * (1 - progress);
          let angle = (j / nodes) * Math.PI * 2 + rotationalSpin;
          
          let rx = currentX + Math.cos(angle) * radius;
          let ry = currentY + Math.sin(angle) * radius;

          if (j === 0) ctx.moveTo(rx, ry);
          else ctx.lineTo(rx, ry);
        }
        ctx.closePath();
        ctx.stroke();

        // Secondary Counter-Rotating Concentric Accent Track Layer
        if (progress > 0.3 && progress < 0.8) {
          ctx.beginPath();
          ctx.arc(currentX, currentY, radius * 0.4, 0, Math.PI * 2);
          ctx.strokeStyle = `hsla(${(hue + 180) % 360}, 90%, 50%, ${progress * 0.25})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }

      // Loop scheduling request linkage execution track
      requestAnimationFrame(draw);
    }

    // Initialize animation rendering loop sequences seamlessly
    draw();
  </script>
</body>
</html>
