<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D Reality Distortion Engine</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    body { 
      background: #000; 
      overflow: hidden; 
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { 
      display: block; 
      width: 100vw; 
      height: 100vh; 
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <canvas id="tunnelCanvas"></canvas>

  <script>
    const canvas = document.getElementById('tunnelCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); 

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    let mouse = { x: width / 2, y: height / 2, targetX: width / 2, targetY: height / 2 };

    const updatePointer = (clientX, clientY) => {
      mouse.targetX = clientX;
      mouse.targetY = clientY;
    };

    window.addEventListener('mousemove', (e) => updatePointer(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) updatePointer(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    // --- Core State Machine & Combo Metrics ---
    let clickCount = 0;
    let clickTimer = null;
    let isWarpActive = false;
    let isSpacePressed = false;
    let isShiftPressed = false;

    // Smooth Interpolation Energy Mixers
    let warpEnergy = 0;   
    let brakeEnergy = 0;  
    let slowMoEnergy = 0; 

    const handleInteraction = () => {
      clickCount++;
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => { clickCount = 0; }, 400);

      if (clickCount === 3) {
        isWarpActive = true;
        clickCount = 0;
        setTimeout(() => { isWarpActive = false; }, 4000);
      }
    };

    window.addEventListener('click', handleInteraction);
    window.addEventListener('touchstart', (e) => {
      if(e.touches.length > 0) updatePointer(e.touches[0].clientX, e.touches[0].clientY);
      handleInteraction();
    }, { passive: true });

    // --- Key Input Matrix Handlers ---
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault(); 
        isSpacePressed = true;
      }
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
        isShiftPressed = true;
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        isSpacePressed = false;
      }
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
        isShiftPressed = false;
      }
    });

    // --- Engine Configuration Core ---
    const maxRings = 65; // Heightened ring volume density for seamless illusion paths
    const segments = 8; 
    let rings = [];
    let frame = 0;

    for (let i = 0; i < maxRings; i++) {
      rings.push({ z: (i / maxRings) * 1.3 });
    }

    const spaceStars = Array.from({ length: 110 }, () => ({
      x: (Math.random() - 0.5) * 1200,
      y: (Math.random() - 0.5) * 1200,
      z: Math.random() * 1.3
    }));

    // --- Quantum Illusion Flare Particles Engine ---
    let shiftSparks = [];

    function spawnShiftSparks(horizonX, horizonY) {
      if (Math.random() < 0.6) {
        for (let s = 0; s < 4; s++) {
          let angle = Math.random() * Math.PI * 2;
          let speed = 3 + Math.random() * 8;
          shiftSparks.push({
            x: (Math.random() - 0.5) * 40, 
            y: (Math.random() - 0.5) * 40,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            z: 1.3, 
            size: 1.5 + Math.random() * 3.5,
            hue: (frame + Math.random() * 60) % 360, // Shifting cosmic hyper-colors
            alpha: 1
          });
        }
      }
    }

    function draw() {
      // Fluid tracking variables to prevent hardware display frame snapping
      mouse.x += (mouse.targetX - mouse.x) * 0.07;
      mouse.y += (mouse.targetY - mouse.y) * 0.07;

      warpEnergy += ((isWarpActive ? 1 : 0) - warpEnergy) * 0.04;
      brakeEnergy += ((isSpacePressed ? 1 : 0) - brakeEnergy) * 0.12;
      slowMoEnergy += ((isShiftPressed ? 1 : 0) - slowMoEnergy) * 0.08;

      let baseSpeed = 0.0016;
      let targetSpeed = baseSpeed + (warpEnergy * 0.02);
      targetSpeed *= (1 - brakeEnergy * 0.95);   
      targetSpeed *= (1 - slowMoEnergy * 0.85);  

      let speedModifier = targetSpeed;

      // Illusion Motion Blur: Shifts to deep trailing feedback layers under intense speeds
      let trailingBlur = 0.14 - (warpEnergy * 0.07) + (slowMoEnergy * 0.06);
      ctx.fillStyle = `rgba(0, 0, 0, ${Math.max(0.03, Math.min(0.35, trailingBlur))})`;
      ctx.fillRect(0, 0, width, height);

      frame += 1.2 * (1 - slowMoEnergy * 0.65);

      // Deep Horizon Convergence Vector Calculations
      let horizonX = width / 2 + (mouse.x - width / 2) * (0.2 + brakeEnergy * 0.3);
      let horizonY = height / 2 + (mouse.y - height / 2) * (0.2 + brakeEnergy * 0.3);

      if (slowMoEnergy > 0.05) {
        spawnShiftSparks(horizonX, horizonY);
      }

      // Phase 1: Star Vectors Deep Layer
      spaceStars.forEach(star => {
        star.z -= speedModifier * 2.5;
        if (star.z <= 0) {
          star.z = 1.3;
          star.x = (Math.random() - 0.5) * 1200;
          star.y = (Math.random() - 0.5) * 1200;
        }

        let starScale = 1.3 / star.z;
        let sx = width / 2 + (star.x + (mouse.x - width / 2) * -0.5) * starScale;
        let sy = height / 2 + (star.y + (mouse.y - height / 2) * -0.5) * starScale;

        let prevZ = star.z + (speedModifier * 2.5);
        let prevScale = 1.3 / prevZ;
        let px = width / 2 + (star.x + (mouse.x - width / 2) * -0.5) * prevScale;
        let py = height / 2 + (star.y + (mouse.y - height / 2) * -0.5) * prevScale;

        if (sx >= 0 && sx <= width && sy >= 0 && sy <= height) {
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(sx, sy);
          
          let starColor = `rgba(0, 230, 255, ${Math.min(1, 1.3 - star.z)})`;
          if (brakeEnergy > 0.05) {
            starColor = `rgba(255, 30, 70, ${Math.min(1, 1.3 - star.z)})`;
          } else if (slowMoEnergy > 0.05) {
            starColor = `hsla(${(frame + star.z * 100) % 360}, 100%, 70%, ${Math.min(1, 1.3 - star.z)})`;
          }
          
          ctx.strokeStyle = starColor;
          ctx.lineWidth = Math.max(1, starScale * 0.5);
          ctx.stroke();
        }
      });

      // Phase 1.5: Render Mind-Bending Cosmic Flares
      for (let i = shiftSparks.length - 1; i >= 0; i--) {
        let p = shiftSparks[i];
        
        p.z -= speedModifier * 3.8; 
        p.x += p.vx * (1 - slowMoEnergy * 0.4);
        p.y += p.vy * (1 - slowMoEnergy * 0.4);

        p.vx *= 0.97;
        p.vy *= 0.97;

        let pScale = 1.3 / p.z;
        let px = horizonX + p.x * pScale;
        let py = horizonY + p.y * pScale;

        if (p.z <= 0.05 || px < 0 || px > width || py < 0 || py > height) {
          shiftSparks.splice(i, 1);
          continue;
        }

        let finalAlpha = p.alpha * (1 - p.z / 1.3) * slowMoEnergy;

        // Draw interconnected quantum light web matrix strings
        if (i > 0 && slowMoEnergy > 0.5) {
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(horizonX + shiftSparks[i-1].x * pScale, horizonY + shiftSparks[i-1].y * pScale);
          ctx.strokeStyle = `rgba(255, 255, 255, ${finalAlpha * 0.15})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }

        ctx.fillStyle = `hsla(${p.hue}, 100%, 75%, ${finalAlpha})`;
        ctx.beginPath();
        ctx.arc(px, py, Math.max(0.6, p.size * pScale), 0, Math.PI * 2);
        ctx.fill();
      }

      // Phase 2: Render Geometric Topology Loops & Mirror Arrays
      for (let i = maxRings - 1; i >= 0; i--) {
        let ring = rings[i];
        ring.z -= speedModifier;
        if (ring.z <= 0) ring.z = 1.3;

        // Perspective warp configuration handling anamorphic stretching bounds
        let zoomFactor = 1.0 + (warpEnergy * 0.9) - (brakeEnergy * 0.5) + (Math.sin(frame * 0.02 + i * 0.1) * 0.03 * slowMoEnergy);
        let scale = zoomFactor / ring.z;
        let radius = 50 * scale;

        let targetX = width / 2 + (mouse.x - width / 2) * (1 - ring.z * (0.72 - brakeEnergy * 0.25));
        let targetY = height / 2 + (mouse.y - height / 2) * (1 - ring.z * (0.72 - brakeEnergy * 0.25));

        let hue = (i * 6 + frame * 2.2) % 360;
        let saturation = 100;
        let lightness = 60;

        if (warpEnergy > 0.1) {
          hue = 200 + (hue * 0.08);
          lightness += warpEnergy * 35;
        }
        if (slowMoEnergy > 0.1) {
          hue = (hue + frame * 0.5) % 360; // Complete hypnotic rainbow sequence shift
          saturation = 95;
        }
        if (brakeEnergy > 0.1) {
          hue = 340 + (hue * 0.05); 
          lightness = 40 + (brakeEnergy * 25);
        }

        let strokeColor = `hsla(${hue}, ${saturation}%, ${lightness}%, ${1 - ring.z / 1.3})`;

        // Build Primary Ring Geometry Node Mapping Loop
        const renderRingInstance = (rMultiplier, spinDir) => {
          ctx.beginPath();
          for (let j = 0; j <= segments; j++) {
            let spinAngle = frame * (0.0025 + warpEnergy * 0.009 - brakeEnergy * 0.003) * (1.3 - ring.z) * spinDir;
            let angle = (j / segments) * Math.PI * 2 + spinAngle;

            let currentRadius = radius * rMultiplier;
            // Inject structural compression waves under spacebar inputs
            if (brakeEnergy > 0.05) {
