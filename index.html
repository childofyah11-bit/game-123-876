<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>game</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #030308;
            --panel: #0a0b12;
            --border: #1a1d36;
            --accent: #00ffaa;
            --accent2: #9d4edd;
            --text: #c5cbe3;
            --system: #565f89;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Share Tech Mono', monospace;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            text-shadow: 0 0 12px rgba(0, 255, 170, 0.4);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 2px;
        }
        .setup-panel {
            background: var(--panel);
            border: 2px solid var(--border);
            padding: 25px;
            border-radius: 12px;
            max-width: 420px;
            width: 100%;
            margin-top: 80px;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #101222;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: var(--accent); }
        button {
            background: linear-gradient(90deg, var(--accent), #00bfff);
            cursor: pointer;
            font-weight: bold;
            border: none;
            color: #030308;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 0 10px var(--accent); }
        .main-layout {
            display: none;
            flex-direction: column;
            align-items: center;
            max-width: 800px;
            width: 100%;
            margin-top: 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 55px);
            grid-template-rows: repeat(10, 55px);
            gap: 6px;
            margin: 15px 0;
            background: #020205;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .cell {
            background: #0e101f;
            border: 1px solid #16192e;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: background 0.1s, transform 0.1s;
        }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 180px; margin-top: 10px; }
        .controls button { margin: 0; padding: 14px; background: #16192e; border: 1px solid var(--border); color: white; border-radius: 8px;}
        .status-header { font-size: 15px; color: #8b949e; letter-spacing: 1px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase;}
    </style>
    <!-- Public server connection client network asset library -->
    <script src="https://unpkg.com"></script>
</head>
<body>

    <h1>🌌 Cosmic Nexus: Sector Control</h1>
    <div style="font-size: 14px; color: var(--system); margin-bottom: 10px;">Automated Relay Matrix Sandbox Layer</div>

    <!-- Login Matrix Panel -->
    <div class="setup-panel" id="loginScreen">
        <h3 style="color:white; margin-top:0;">📡 Map Sector Telemetry</h3>
        <input type="text" id="nameBox" placeholder="Enter Your Callsign (e.g., Pilot_1)">
        <input type="text" id="roomBox" placeholder="Enter Room Key (e.g., alpha-sector)">
        <button onclick="connectToRelayNetwork()">Launch Orbit Link</button>
        <p style="font-size: 12px; color: var(--system); margin-top: 15px;">Type any room name. Tell a friend to type the same room name to connect instantly.</p>
    </div>

    <!-- Main Live Interactive Grid Panel -->
    <div class="main-layout" id="gameScreen">
        <div class="status-header" id="syncStatus">Syncing tracking vector coordinates...</div>
        <div class="grid" id="matrixContainer"></div>
        <div class="controls">
            <div></div><button onclick="triggerShift(0, -1)">▲</button><div></div>
            <button onclick="triggerShift(-1, 0)">◀</button><div></div><button onclick="triggerShift(1, 0)">▶</button>
            <div></div><button onclick="triggerShift(0, 1)">▼</button><div></div>
        </div>
    </div>

<script>
    let networkClient = null;
    let currentCallsign = "";
    let targetTopicLane = "";
    
    let localX = Math.floor(Math.random() * 10);
    let localY = Math.floor(Math.random() * 10);
    let sessionUserList = {};

    function connectToRelayNetwork() {
        currentCallsign = document.getElementById('nameBox').value.trim() || "Pilot_" + Math.floor(Math.random()*900+100);
        let roomSignature = document.getElementById('roomBox').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '-');

        if(!roomSignature) {
            alert("❌ Please specify a Room Key name to calibrate your telemetry engine.");
            return;
        }

        targetTopicLane = `cosmicnexus/sectors/${roomSignature}`;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'flex';
        
        buildInteractiveGrid();

        // Connect over free public HiveMQ open web broker layer automatically
        networkClient = mqtt.connect('wss://://hivemq.com');

        networkClient.on('connect', () => {
            document.getElementById('syncStatus').innerText = `Sector: ${roomSignature} | Pilot: ${currentCallsign}`;
            
            // Subscribe to room updates
            networkClient.subscribe(targetTopicLane);
            
            // Instantly announce presence
            sendNetworkPulse('join', `connected`);
        });

        networkClient.on('message', (topic, message) => {
            try {
                const packet = JSON.parse(message.toString());
                if(packet.sender === currentCallsign) return; // Skip echo reflections

                if(packet.action === 'join' || packet.action === 'sync' || packet.action === 'move') {
                    sessionUserList[packet.sender] = { x: packet.gridX, y: packet.gridY, activeTime: Date.now() };
                    renderPositions();
                    if(packet.action === 'join') {
                        // Respond with position metrics to register on their client instantly
                        sendNetworkPulse('sync', 'updating matrix positioning data');
                    }
                }
            } catch(err) {
                // Ignore unexpected stream garbage safely
            }
        });

        // Loop to prune disconnected players (inactive for 12 seconds)
        setInterval(() => {
            let cutoff = Date.now() - 12000;
            let changed = false;
            Object.keys(sessionUserList).forEach(user => {
                if(sessionUserList[user].activeTime < cutoff) {
                    delete sessionUserList[user];
                    changed = true;
                }
            });
            if(changed) renderPositions();
        }, 4000);
    }

    function buildInteractiveGrid() {
        const grid = document.getElementById('matrixContainer');
        grid.innerHTML = "";
        for (let y = 0; y < 10; y++) {
            for (let x = 0; x < 10; x++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `grid-sector-${x}-${y}`;
                grid.appendChild(cell);
            }
        }
        renderPositions();
    }

    function renderPositions() {
        document.querySelectorAll('.cell').forEach(c => {
            c.innerText = "";
            c.style.background = "#0e101f";
            c.style.borderColor = "#16192e";
            c.style.transform = "scale(1)";
        });

        // Pin local coordinate entity profile
        const localCell = document.getElementById(`grid-sector-${localX}-${localY}`);
        if(localCell) {
            localCell.innerText = "🛸";
            localCell.style.background = "rgba(0, 255, 170, 0.15)";
            localCell.style.borderColor = "var(--accent)";
            localCell.style.transform = "scale(1.05)";
        }

        // Pin mapped online player assets
        Object.keys(sessionUserList).forEach(user => {
            const data = sessionUserList[user];
            const peerCell = document.getElementById(`grid-sector-${data.x}-${data.y}`);
            if(peerCell) {
                peerCell.innerText = "👾";
                peerCell.style.background = "rgba(157, 78, 221, 0.15)";
                peerCell.style.borderColor = "var(--accent2)";
            }
        });
    }

    function triggerShift(dx, dy) {
        let nextX = Math.max(0, Math.min(9, localX + dx));
        let nextY = Math.max(0, Math.min(9, localY + dy));
        if(nextX !== localX || nextY !== localY) {
            localX = nextX;
